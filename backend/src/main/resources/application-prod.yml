spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:disabled}
    password: ${MAIL_PASSWORD:disabled}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 60MB

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:1209600000}
  issuer: ${JWT_ISSUER:povi}

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
  mail:
    verification-link: "http://${SERVER_IP:localhost}:8081/api/auth/verify-email?token="

file:
  upload:
    diary:
      dir: /app/uploads/diary
    community:
      dir: /app/uploads/community
    profile:
      dir: /app/uploads/profile

logging:
  level:
    org.hibernate.SQL: info